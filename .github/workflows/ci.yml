name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
      - name: Build retrieval artifacts
        run: python -m src.build_index
      - name: Evaluate retrieval
        run: python -m src.evaluate_retrieval
      - name: Smoke test CLI search
        run: python -m src.search --query "password reset" --method tfidf --top-k 1
